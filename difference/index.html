<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spot the Difference &mdash; Flora &amp; Tom</title>
<script src="../assets/transition.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Josefin+Sans:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/poster.css?v=3">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #puzzle-phase {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    min-height: 100vh;
  }

  .top-bar {
    width: 100%; background: rgba(0,0,0,0.3); color: #eee;
    padding: 1rem 1.5rem; display: flex; align-items: center; gap: 1rem;
  }
  .top-bar a { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 0.8rem; }
  .top-bar a:hover { color: #eee; }
  .top-bar h1 {
    font-family: 'Abril Fatface', serif; font-size: clamp(1rem, 3vw, 1.4rem);
    font-weight: 400; flex: 1; text-align: center;
  }

  header {
    text-align: center;
    padding: 1rem 1rem 0.5rem;
  }

  .score {
    font-size: 1.1rem;
    color: #aaa;
  }

  .score span {
    color: #4ade80;
    font-weight: bold;
  }

  .game {
    display: flex;
    gap: 1rem;
    padding: 1rem;
    max-width: 1400px;
    width: 100%;
    justify-content: center;
    flex-wrap: wrap;
  }

  .image-panel {
    position: relative;
    flex: 1 1 400px;
    max-width: 600px;
    cursor: crosshair;
    border-radius: 8px;
    overflow: hidden;
    border: 3px solid #333;
    transition: border-color 0.2s;
  }

  .image-panel:hover {
    border-color: #555;
  }

  .image-panel img {
    display: block;
    width: 100%;
    height: auto;
  }

  .label {
    position: absolute;
    top: 0;
    left: 0;
    background: rgba(0,0,0,0.6);
    color: #ccc;
    padding: 0.3rem 0.7rem;
    font-size: 0.8rem;
    border-bottom-right-radius: 6px;
    pointer-events: none;
  }

  .marker {
    position: absolute;
    border: 3px solid #4ade80;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    animation: pop 0.3s ease-out;
  }

  .marker .marker-label {
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    margin-top: 4px;
    background: #4ade80;
    color: #111;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    white-space: nowrap;
    font-weight: 600;
  }

  @keyframes pop {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    60% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }

  .miss {
    position: absolute;
    width: 30px;
    height: 30px;
    border: 2px solid #f87171;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    animation: miss-fade 0.8s ease-out forwards;
  }

  @keyframes miss-fade {
    0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
  }

  @media (max-width: 850px) {
    .game { flex-direction: column; align-items: center; }
    .image-panel { max-width: 95vw; flex: none; }
  }
</style>
</head>
<body>

<div id="puzzle-phase">
  <div class="top-bar">
    <a href="../index.html">&larr; back</a>
    <h1>Spot the Difference</h1>
    <span style="width:40px"></span>
  </div>

  <header>
    <p class="score">Found: <span id="found-count">0</span> / <span id="total-count">0</span></p>
  </header>

  <div class="game">
    <div class="image-panel" id="panel-original">
      <img id="img-original" alt="Original">
      <div class="label">Original</div>
    </div>
    <div class="image-panel" id="panel-changed">
      <img id="img-changed" alt="Changed">
      <div class="label">Changed</div>
    </div>
  </div>

</div>

<script>
(function() {
  const differences = [
    { id:1, label:"Telegraph pole", center_normalized:{x:0.072,y:0.3373}, radius_normalized:0.0796 },
    { id:2, label:"T-shirt", center_normalized:{x:0.3865,y:0.4104}, radius_normalized:0.0597 },
    { id:3, label:"Spokes and bug", center_normalized:{x:0.6055,y:0.797}, radius_normalized:0.1991 },
    { id:4, label:"Person", center_normalized:{x:0.4701,y:0.3657}, radius_normalized:0.0398 },
    { id:5, label:"Helmet", center_normalized:{x:0.3089,y:0.2552}, radius_normalized:0.0398 }
  ];

  document.getElementById('total-count').textContent = differences.length;
  document.getElementById('img-original').src = 'original.jpeg';
  document.getElementById('img-changed').src = 'changed.jpg';

  const found = new Set();

  function updateScore() {
    document.getElementById('found-count').textContent = found.size;
    if (found.size === differences.length) {
      triggerPosterReveal('puzzle-phase', 'difference');
    }
  }

  function addMarker(panel, diff, rect) {
    const cx = diff.center_normalized.x * rect.width;
    const cy = diff.center_normalized.y * rect.height;
    const r = diff.radius_normalized * rect.width;

    const el = document.createElement('div');
    el.className = 'marker';
    el.style.left = cx + 'px';
    el.style.top = cy + 'px';
    el.style.width = (r * 2) + 'px';
    el.style.height = (r * 2) + 'px';

    const lbl = document.createElement('div');
    lbl.className = 'marker-label';
    lbl.textContent = diff.label;
    el.appendChild(lbl);

    panel.appendChild(el);
  }

  function addMiss(panel, x, y) {
    const el = document.createElement('div');
    el.className = 'miss';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    panel.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }

  function handleClick(e, panel) {
    const img = panel.querySelector('img');
    const rect = img.getBoundingClientRect();
    const panelRect = panel.getBoundingClientRect();

    const clickX = e.clientX - rect.left;
    const clickY = e.clientY - rect.top;
    const normX = clickX / rect.width;
    const normY = clickY / rect.height;

    let hit = null;
    for (const diff of differences) {
      if (found.has(diff.id)) continue;
      const dx = normX - diff.center_normalized.x;
      const dy = normY - diff.center_normalized.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      // Use a slightly generous hit zone
      if (dist <= diff.radius_normalized * 1.3) {
        hit = diff;
        break;
      }
    }

    if (hit) {
      found.add(hit.id);
      // Add marker on both panels
      const origPanel = document.getElementById('panel-original');
      const changedPanel = document.getElementById('panel-changed');
      addMarker(origPanel, hit, origPanel.querySelector('img').getBoundingClientRect());
      addMarker(changedPanel, hit, changedPanel.querySelector('img').getBoundingClientRect());
      updateScore();
    } else {
      const relX = e.clientX - panelRect.left;
      const relY = e.clientY - panelRect.top;
      addMiss(panel, relX, relY);
    }
  }

  document.getElementById('panel-original').addEventListener('click', function(e) {
    handleClick(e, this);
  });
  document.getElementById('panel-changed').addEventListener('click', function(e) {
    handleClick(e, this);
  });

  // Reposition markers on resize
  window.addEventListener('resize', function() {
    document.querySelectorAll('.marker').forEach(m => m.remove());
    const origPanel = document.getElementById('panel-original');
    const changedPanel = document.getElementById('panel-changed');
    for (const diff of differences) {
      if (!found.has(diff.id)) continue;
      addMarker(origPanel, diff, origPanel.querySelector('img').getBoundingClientRect());
      addMarker(changedPanel, diff, changedPanel.querySelector('img').getBoundingClientRect());
    }
  });
})();
</script>
<script src="../assets/config.js"></script>
<script>if(window.trackEvent) trackEvent('puzzle_attempt', 'difference');</script>
<script src="../assets/poster.js?v=3"></script>
<script src="../assets/floating-cutouts.js"></script>
<div style="position:fixed;bottom:0.5rem;left:0;right:0;text-align:center;font-family:'Josefin Sans',sans-serif;font-weight:300;font-size:0.55rem;color:rgba(255,245,230,0.15);letter-spacing:0.1em;pointer-events:none;">Made by Flora and Claude</div>
</body>
</html>
